name: Deploy exportacionjuego to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "exportacionjuego/**"
      - ".github/workflows/deploy-exportacionjuego-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-exportacionjuego
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: exportacionjuego
